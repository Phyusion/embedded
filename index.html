<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 3rem;
            font-size: 1.05rem;
        }
        .grid {
            display: grid;
            gap: 1.25rem;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.15s;
            display: block;
        }
        .card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #58a6ff;
        }
        .card .meta {
            color: #8b949e;
            font-size: 0.9rem;
        }
        .card .venue {
            color: #a5a5a5;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Presentations</h1>
        <p class="subtitle">Slide decks and talks</p>
        <div class="grid">

            <a class="card" href="simulators-dilemma/">
                <h2>The Simulator's Dilemma</h2>
                <div class="meta">March 26, 2026</div>
                <div class="venue">NCI Foundation Models for Cancer Workshop</div>
            </a>

            <!-- To add a new presentation, copy this template:
            <a class="card" href="folder-name/">
                <h2>Talk Title</h2>
                <div class="meta">Date</div>
                <div class="venue">Event / Venue</div>
            </a>
            -->

        </div>
    </div>
</body>
</html>
